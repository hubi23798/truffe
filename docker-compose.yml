services:
  app:
    image: node:22-alpine
    working_dir: /app
    command: >
      sh -c "corepack enable &&
             corepack prepare pnpm@9.15.0 --activate &&
             pnpm install &&
             pnpm db:migrate &&
             pnpm dev"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - pnpm_store:/root/.local/share/pnpm/store
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/piggy
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@piggy.ai}
      RP_ID: localhost
      RP_NAME: piggy.ai
      ORIGIN: http://localhost:3000
      NODE_ENV: development
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: piggy
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  pnpm_store:
  node_modules:
  next_cache:
