name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy to Fly
        run: flyctl deploy --remote-only --app boink
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Post-deploy smoke. PROD_DOMAIN is a repo *variable* (Settings →
      # Variables) holding the bare host (no scheme), e.g. "boink.example.com".
      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS https://${{ vars.PROD_DOMAIN }}/api/health > /dev/null; then
              echo "healthy"; exit 0
            fi
            sleep 2
          done
          echo "Service did not become healthy"; exit 1

      - name: Verify security headers
        run: |
          set -e
          headers=$(curl -sI https://${{ vars.PROD_DOMAIN }}/api/health)
          for h in 'strict-transport-security' 'x-content-type-options' \
                   'referrer-policy' 'x-frame-options' \
                   'permissions-policy' 'content-security-policy'; do
            echo "$headers" | tr 'A-Z' 'a-z' | grep -q "$h: " \
              || { echo "Missing header: $h"; exit 1; }
          done
          echo "All security headers present."
