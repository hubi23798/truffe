name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: finance
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/finance
      RP_ID: localhost
      RP_NAME: boink!
      ORIGIN: http://localhost:3000
      # Cookie names left at the env defaults (session / enrollment) so they
      # are spec-valid without HTTPS in CI.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      # Build before typecheck so .next/types/* (typedRoutes) is populated;
      # tsc would otherwise fail on redirect("/login") etc.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Migrate DB
        run: pnpm db:migrate

      - name: Unit tests
        run: pnpm test:unit -- --run

      - name: Install Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm test:e2e
